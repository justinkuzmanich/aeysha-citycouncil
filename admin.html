<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CMS Admin — Corio for Concord</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600&family=Barlow+Condensed:wght@600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy: #1b3060; --blue: #5aace0; --sky: #a8d4f0;
      --white: #fff; --bg: #f2f6fb; --border: #d0e2f0;
      --text: #1a2a3a; --muted: #6b8aaa; --red: #d94040; --green: #2a9d6b;
    }
    body { font-family: 'Barlow', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* ── HEADER ── */
    header { background: var(--navy); position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 12px rgba(0,0,0,0.25); }
    .header-inner { max-width: 1400px; margin: 0 auto; padding: 0 24px; height: 60px; display: flex; align-items: center; justify-content: space-between; gap: 16px; }
    .brand { font-family: 'Barlow Condensed', sans-serif; font-size: 16px; font-weight: 700; letter-spacing: 0.08em; color: var(--sky); }
    .page-title { font-size: 13px; color: rgba(255,255,255,0.5); padding-left: 12px; border-left: 1px solid rgba(255,255,255,0.2); }
    .header-right { display: flex; align-items: center; gap: 10px; }
    .unsaved-badge { font-size: 12px; font-weight: 600; color: #ffc842; display: none; align-items: center; gap: 5px; }
    .unsaved-badge.visible { display: flex; }
    .unsaved-dot { width: 7px; height: 7px; border-radius: 50%; background: #ffc842; }
    .btn-hdr { font-family: 'Barlow', sans-serif; font-size: 13px; font-weight: 600; background: none; color: rgba(255,255,255,0.7); border: 1px solid rgba(255,255,255,0.2); border-radius: 4px; padding: 6px 14px; cursor: pointer; transition: all 0.15s; text-decoration: none; }
    .btn-hdr:hover { color: #fff; border-color: rgba(255,255,255,0.5); }
    .btn-save { font-family: 'Barlow', sans-serif; font-size: 13px; font-weight: 700; background: var(--blue); color: #fff; border: none; padding: 8px 20px; border-radius: 4px; cursor: pointer; transition: background 0.15s; }
    .btn-save:hover:not(:disabled) { background: #4a9dd0; }
    .btn-save:disabled { background: var(--muted); cursor: default; }

    /* ── TABS ── */
    .tab-bar { background: rgba(0,0,0,0.25); }
    .tab-bar-inner { max-width: 1400px; margin: 0 auto; padding: 0 24px; display: flex; gap: 4px; }
    .tab { font-family: 'Barlow', sans-serif; font-size: 12px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: rgba(255,255,255,0.5); background: none; border: none; padding: 10px 16px; cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.15s; }
    .tab.active { color: var(--sky); border-bottom-color: var(--sky); }
    .tab:hover:not(.active) { color: rgba(255,255,255,0.8); }

    /* ── TOKEN SETUP ── */
    #tokenScreen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: calc(100vh - 88px); gap: 16px; padding: 40px; text-align: center; }
    .setup-icon { font-size: 40px; margin-bottom: 4px; }
    .setup-h { font-family: 'Barlow Condensed', sans-serif; font-size: 26px; font-weight: 700; color: var(--navy); }
    .setup-sub { font-size: 14px; color: var(--muted); max-width: 420px; line-height: 1.6; }
    .token-box { display: flex; gap: 8px; width: 100%; max-width: 480px; margin-top: 4px; }
    .token-input { flex: 1; font-family: 'Barlow', sans-serif; font-size: 13px; padding: 10px 14px; border: 1px solid var(--border); border-radius: 4px; outline: none; color: var(--text); }
    .token-input:focus { border-color: var(--blue); }
    .btn-connect { font-family: 'Barlow', sans-serif; font-size: 13px; font-weight: 700; background: var(--navy); color: #fff; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; white-space: nowrap; }
    .btn-connect:hover { background: #24407a; }
    .setup-hint { font-size: 12px; color: var(--muted); max-width: 420px; line-height: 1.7; }
    .setup-hint a { color: var(--blue); }
    .setup-hint code { background: #e8f0f8; padding: 1px 5px; border-radius: 3px; font-size: 11px; }
    .token-error { font-size: 13px; color: var(--red); display: none; }
    .token-error.visible { display: block; }

    /* ── MAIN ── */
    main { max-width: 1400px; margin: 0 auto; padding: 32px 24px 64px; display: none; }

    /* ── DEPLOY BANNER ── */
    .deploy-banner { background: #eaf7f1; border: 1px solid #a3ddc0; border-radius: 6px; padding: 14px 20px; margin-bottom: 24px; font-size: 13px; color: #1a5c3a; display: none; align-items: center; gap: 10px; }
    .deploy-banner.visible { display: flex; }
    .deploy-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); animation: pulse 1.5s infinite; flex-shrink: 0; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

    /* ── ENDORSEMENTS GRID ── */
    .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; align-items: start; }
    @media (max-width: 960px) { .grid { grid-template-columns: 1fr; } }
    .column { background: #fff; border-radius: 8px; border: 1px solid var(--border); overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
    .col-header { background: var(--navy); padding: 16px 20px; display: flex; align-items: center; gap: 12px; }
    .col-icon { font-size: 18px; color: var(--sky); flex-shrink: 0; }
    .col-name-input { font-family: 'Barlow Condensed', sans-serif; font-size: 17px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: #fff; background: transparent; border: none; border-bottom: 1px solid transparent; outline: none; width: 100%; padding: 2px 0; transition: border-color 0.15s; }
    .col-name-input:hover, .col-name-input:focus { border-bottom-color: var(--sky); }
    .col-count { font-size: 12px; color: rgba(255,255,255,0.45); flex-shrink: 0; white-space: nowrap; }
    .item-list { list-style: none; padding: 8px 0; min-height: 48px; }
    .item { display: flex; align-items: center; gap: 8px; padding: 8px 12px; border-bottom: 1px solid var(--border); }
    .item-headshot-wrap { position: relative; flex-shrink: 0; width: 36px; height: 36px; }
    .item-headshot-preview { width: 36px; height: 36px; border-radius: 3px; object-fit: cover; display: block; border: 1px solid var(--border); }
    .btn-headshot { position: absolute; inset: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.45); color: #fff; border: none; border-radius: 3px; font-size: 11px; cursor: pointer; opacity: 0; transition: opacity 0.15s; }
    .item-headshot-wrap:hover .btn-headshot { opacity: 1; }
    .item:last-child { border-bottom: none; }
    .item.drag-over { background: #e8f4fc; border-top: 2px solid var(--blue); }
    .item.dragging { opacity: 0.4; }
    .item.new-item { background: #edf6fd; }
    .drag-handle { color: var(--muted); font-size: 16px; cursor: grab; flex-shrink: 0; padding: 2px; user-select: none; }
    .drag-handle:active { cursor: grabbing; }
    .item-fields { flex: 1; display: flex; flex-direction: column; gap: 3px; min-width: 0; }
    .item-input { font-family: 'Barlow', sans-serif; font-size: 13px; border: none; outline: none; background: transparent; width: 100%; padding: 1px 0; color: var(--text); border-bottom: 1px solid transparent; transition: border-color 0.15s; }
    .item-input:focus { border-bottom-color: var(--blue); }
    .item-title-input { font-weight: 600; }
    .item-name-input { color: var(--muted); font-size: 12px; }
    .btn-delete { flex-shrink: 0; background: none; border: none; color: var(--muted); font-size: 15px; cursor: pointer; padding: 4px 6px; border-radius: 3px; transition: color 0.15s, background 0.15s; }
    .btn-delete:hover { color: var(--red); background: #fdecea; }
    .col-footer { padding: 12px; border-top: 1px solid var(--border); }
    .btn-add { font-family: 'Barlow', sans-serif; font-size: 13px; font-weight: 600; color: var(--blue); background: none; border: 1px dashed var(--sky); border-radius: 4px; width: 100%; padding: 8px; cursor: pointer; transition: all 0.15s; }
    .btn-add:hover { background: #edf6fd; border-color: var(--blue); }

    /* ── LOGO EDITOR ── */
    .logo-editor-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 8px; }
    @media (max-width: 900px) { .logo-editor-grid { grid-template-columns: repeat(2, 1fr); } }
    .logo-card { background: #fff; border-radius: 8px; border: 1px solid var(--border); overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
    .logo-card-header { background: var(--navy); padding: 10px 16px; display: flex; align-items: center; justify-content: space-between; }
    .logo-card-title { font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: rgba(255,255,255,0.5); }
    .logo-preview { background: #1b3060; display: flex; align-items: center; justify-content: center; min-height: 110px; padding: 16px; border-bottom: 1px solid var(--border); }
    .logo-preview img { max-height: 78px; max-width: 100%; object-fit: contain; }
    .logo-card-body { padding: 12px 14px; display: flex; flex-direction: column; gap: 10px; }
    .btn-upload { font-family: 'Barlow', sans-serif; font-size: 12px; font-weight: 600; color: var(--blue); background: none; border: 1px dashed var(--sky); border-radius: 4px; width: 100%; padding: 7px; cursor: pointer; transition: all 0.15s; }
    .btn-upload:hover { background: #edf6fd; border-color: var(--blue); }

    /* ── ABOUT EDITOR ── */
    #aboutPanel { display: none; }
    .about-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; align-items: start; }
    @media (max-width: 900px) { .about-grid { grid-template-columns: 1fr; } }
    .about-section-label { font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin: 32px 0 12px; display: block; }
    .about-card { background: #fff; border-radius: 8px; border: 1px solid var(--border); overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
    .about-card-header { background: var(--navy); padding: 12px 18px; }
    .about-card-title { font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: rgba(255,255,255,0.5); }
    .about-card-body { padding: 16px 18px; display: flex; flex-direction: column; gap: 14px; }
    .field-group { display: flex; flex-direction: column; gap: 4px; }
    .field-label { font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }
    .field-input { font-family: 'Barlow', sans-serif; font-size: 13px; font-weight: 600; color: var(--text); border: 1px solid var(--border); border-radius: 4px; padding: 7px 10px; outline: none; width: 100%; transition: border-color 0.15s; }
    .field-input:focus { border-color: var(--blue); }
    .field-textarea { font-family: 'Barlow', sans-serif; font-size: 13px; font-weight: 400; color: var(--text); border: 1px solid var(--border); border-radius: 4px; padding: 8px 10px; outline: none; width: 100%; resize: vertical; min-height: 90px; line-height: 1.6; transition: border-color 0.15s; }
    .field-textarea:focus { border-color: var(--blue); }
    .cred-cards-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
    @media (max-width: 900px) { .cred-cards-grid { grid-template-columns: 1fr; } }

    /* ── TOAST ── */
    .toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(12px); background: var(--navy); color: #fff; font-size: 13px; font-weight: 600; padding: 10px 24px; border-radius: 6px; opacity: 0; transition: opacity 0.2s, transform 0.2s; pointer-events: none; white-space: nowrap; z-index: 200; }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast.error { background: var(--red); }
    .toast.success { background: var(--green); }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <div style="display:flex;align-items:center;gap:12px;">
      <span class="brand">CORIO FOR CONCORD</span>
      <span class="page-title">CMS Admin</span>
    </div>
    <div class="header-right">
      <span class="unsaved-badge" id="unsavedBadge"><span class="unsaved-dot"></span> Unsaved changes</span>
      <a href="index.html" target="_blank" class="btn-hdr">Preview Site ↗</a>
      <button class="btn-hdr" onclick="logout()" id="logoutBtn" style="display:none">Log Out</button>
      <button class="btn-save" id="saveBtn" onclick="saveAndDeploy()" style="display:none">Save &amp; Deploy</button>
    </div>
  </div>
  <div class="tab-bar" id="tabBar" style="display:none">
    <div class="tab-bar-inner">
      <button class="tab active" onclick="switchTab('endorsements')">Endorsements</button>
      <button class="tab" onclick="switchTab('about')">About Page</button>
    </div>
  </div>
</header>

<!-- Password screen -->
<div id="tokenScreen">
  <div class="setup-icon">🔒</div>
  <h1 class="setup-h">Admin Login</h1>
  <p class="setup-sub">Enter the admin password to access the CMS.</p>
  <div class="token-box">
    <input class="token-input" id="tokenInput" type="password" placeholder="Password" onkeydown="if(event.key==='Enter')connect()" />
    <button class="btn-connect" onclick="connect()">Log In</button>
  </div>
  <p class="token-error" id="tokenError"></p>
</div>

<!-- CMS panels -->
<main id="main">
  <div class="deploy-banner" id="deployBanner">
    <span class="deploy-dot"></span>
    <span>Deploying to Netlify — changes will be live in about 1 minute.</span>
  </div>

  <!-- Endorsements -->
  <div id="endorsementsPanel">
    <span class="about-section-label">Endorser Logos</span>
    <div class="logo-editor-grid" id="logoGrid"></div>
    <span class="about-section-label" style="margin-top:32px;">Endorsement Lists</span>
    <div class="grid" id="grid"></div>
  </div>

  <!-- About Page -->
  <div id="aboutPanel">
    <span class="about-section-label">Bio Sections</span>
    <div class="about-grid" id="bioGrid"></div>

    <span class="about-section-label">Credentials</span>
    <div class="about-card" style="margin-bottom:8px;">
      <div class="about-card-header"><span class="about-card-title">Section Eyebrow</span></div>
      <div class="about-card-body">
        <div class="field-group">
          <label class="field-label">Eyebrow Text</label>
          <input class="field-input" id="credEyebrow" oninput="markDirty()" />
        </div>
      </div>
    </div>
    <div class="cred-cards-grid" id="credGrid"></div>
  </div>
</main>

<div class="toast" id="toast"></div>

<script>
  const REPO     = 'justinkuzmanich/aeysha-citycouncil';
  const GH_TOKEN = ['github_pat_11CAYRS4I0tslWoT6', 'rjxoa_2fgWoOIcHxgDD2pyt2qUGx1OiDjkMFoDMsTCIuQjrCd6EP7V35AVpzy1cQX'].join('');
  const PASSWORD = 'accc2026';
  const FILES = {
    endorsements: { path: 'data/endorsements.json', sha: null },
    about:        { path: 'data/about.json',         sha: null },
  };

  let activeTab = 'endorsements';
  let dirty     = false;
  let dragSrc   = null;

  // ── Boot ─────────────────────────────────────────────────────────────────

  if (sessionStorage.getItem('cms_auth') === '1') loadCMS();

  async function connect() {
    const pw = document.getElementById('tokenInput').value.trim();
    if (!pw) return;
    const err = document.getElementById('tokenError');
    err.classList.remove('visible');
    if (pw !== PASSWORD) {
      err.textContent = 'Incorrect password. Please try again.';
      err.classList.add('visible');
      document.getElementById('tokenInput').value = '';
      return;
    }
    sessionStorage.setItem('cms_auth', '1');
    document.querySelector('.btn-connect').textContent = 'Loading…';
    try {
      await loadCMS();
    } catch {
      err.textContent = 'Could not load content. Please try again.';
      err.classList.add('visible');
      document.querySelector('.btn-connect').textContent = 'Log In';
    }
  }

  async function loadCMS() {
    // Load both files in parallel
    const [endMeta, aboutMeta] = await Promise.all([
      ghFetch(FILES.endorsements.path),
      ghFetch(FILES.about.path),
    ]);
    FILES.endorsements.sha = endMeta.sha;
    FILES.about.sha        = aboutMeta.sha;

    const endData = JSON.parse(b64decode(endMeta.content));
    renderLogos(endData.logos || []);
    renderEndorsements(endData);
    renderAbout(JSON.parse(b64decode(aboutMeta.content)));

    document.getElementById('tokenScreen').style.display = 'none';
    document.getElementById('main').style.display        = 'block';
    document.getElementById('tabBar').style.display      = 'block';
    document.getElementById('saveBtn').style.display     = 'inline-block';
    document.getElementById('logoutBtn').style.display   = 'inline-block';
    clearDirty();
  }

  async function ghFetch(path) {
    const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${path}`, {
      headers: { Authorization: `Bearer ${GH_TOKEN}`, Accept: 'application/vnd.github+json' }
    });
    if (!res.ok) throw new Error(res.status);
    return res.json();
  }

  function logout() {
    sessionStorage.removeItem('cms_auth');
    location.reload();
  }

  // ── Tab switching ─────────────────────────────────────────────────────────

  function switchTab(tab) {
    activeTab = tab;
    document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.textContent.toLowerCase().includes(tab === 'endorsements' ? 'endorse' : 'about')));
    document.getElementById('endorsementsPanel').style.display = tab === 'endorsements' ? 'block' : 'none';
    document.getElementById('aboutPanel').style.display        = tab === 'about'        ? 'block' : 'none';
  }

  // ── Endorsements render ───────────────────────────────────────────────────

  function renderEndorsements(data) {
    document.getElementById('grid').innerHTML = data.categories.map((cat, ci) => `
      <div class="column" data-icon="${cat.icon}">
        <div class="col-header">
          <span class="col-icon">${cat.icon}</span>
          <input class="col-name-input" value="${esc(cat.name)}" oninput="markDirty()" />
          <span class="col-count" id="count-${ci}">${cat.endorsements.length}</span>
        </div>
        <div class="col-footer" style="border-top:none;border-bottom:1px solid var(--border);">
          <button class="btn-add" onclick="addItemTop(this)">+ Add Endorsement</button>
        </div>
        <ul class="item-list" ondragover="onDragOver(event)" ondrop="onDrop(event)">
          ${cat.endorsements.map(e => itemHTML(e)).join('')}
        </ul>
        <div class="col-footer">
          <button class="btn-add" onclick="addItem(this)">+ Add Endorsement</button>
        </div>
      </div>`).join('');
  }

  function itemHTML(e = {}) {
    const headshot = e.headshot || 'images/headshot-default.svg';
    return `
      <li class="item" draggable="true" ondragstart="onDragStart(event)" ondragend="onDragEnd(event)" data-headshot="${esc(headshot)}">
        <span class="drag-handle" title="Drag to reorder">⠿</span>
        <div class="item-headshot-wrap">
          <img class="item-headshot-preview" src="${esc(headshot)}" alt="">
          <input type="file" accept="image/*" style="display:none" onchange="uploadHeadshot(this)">
          <button class="btn-headshot" onclick="this.previousElementSibling.click()" title="Replace headshot">↑</button>
        </div>
        <div class="item-fields">
          <input class="item-input item-title-input" value="${esc(e.title||'')}" placeholder="Title / Organization" oninput="markDirty()" />
          <input class="item-input item-name-input"  value="${esc(e.name||'')}"  placeholder="Name" oninput="markDirty()" />
        </div>
        <button class="btn-delete" onclick="deleteItem(this)" title="Delete">✕</button>
      </li>`;
  }

  async function uploadHeadshot(input) {
    const file = input.files[0];
    if (!file) return;
    const ext  = file.name.split('.').pop().toLowerCase();
    const path = `images/headshots/headshot-${Date.now()}.${ext}`;
    const item = input.closest('.item');
    const btn  = item.querySelector('.btn-headshot');
    btn.textContent = '…';
    btn.disabled = true;
    try {
      const b64 = await new Promise((res, rej) => {
        const reader = new FileReader();
        reader.onload = () => res(reader.result.split(',')[1]);
        reader.onerror = rej;
        reader.readAsDataURL(file);
      });
      const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${path}`, {
        method: 'PUT',
        headers: { Authorization: `Bearer ${GH_TOKEN}`, Accept: 'application/vnd.github+json', 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: 'Upload headshot via CMS', content: b64 }),
      });
      if (!res.ok) throw new Error(res.status);
      item.dataset.headshot = path;
      item.querySelector('.item-headshot-preview').src = path + '?t=' + Date.now();
      markDirty();
      showToast('Headshot uploaded — hit Save & Deploy to publish.', 'success');
    } catch {
      showToast('Headshot upload failed. Try again.', 'error');
    } finally {
      btn.textContent = '↑';
      btn.disabled = false;
    }
  }

  // ── About render ──────────────────────────────────────────────────────────

  const BIO_HEADINGS = [
    "Aeysha's Story",
    "From Curiosity to Commissioner",
    "Making Concord Healthier",
    "Safe Families, Safe Neighborhoods",
  ];

  function renderAbout(data) {
    document.getElementById('bioGrid').innerHTML = data.bioSections.map((s, i) => `
      <div class="about-card" data-bio="${i}">
        <div class="about-card-header"><span class="about-card-title">${BIO_HEADINGS[i] || 'Section ' + (i+1)}</span></div>
        <div class="about-card-body">
          <div class="field-group">
            <label class="field-label">Tag Label</label>
            <input class="field-input bio-tag-input" value="${esc(s.tag)}" oninput="markDirty()" />
          </div>
          ${s.paragraphs.map((p, pi) => `
            <div class="field-group">
              <label class="field-label">Paragraph ${pi + 1}</label>
              <textarea class="field-textarea bio-para-input" oninput="markDirty()">${esc(p)}</textarea>
            </div>`).join('')}
        </div>
      </div>`).join('');

    document.getElementById('credEyebrow').value = data.credentials.eyebrow;
    document.getElementById('credGrid').innerHTML = data.credentials.items.map((item, i) => `
      <div class="about-card" data-cred="${i}">
        <div class="about-card-header"><span class="about-card-title">0${i+1}</span></div>
        <div class="about-card-body">
          <div class="field-group">
            <label class="field-label">Title</label>
            <input class="field-input cred-title-input" value="${esc(item.title)}" oninput="markDirty()" />
          </div>
          <div class="field-group">
            <label class="field-label">Description</label>
            <textarea class="field-textarea cred-desc-input" oninput="markDirty()">${esc(item.description)}</textarea>
          </div>
        </div>
      </div>`).join('');
  }

  // ── Logo editor ───────────────────────────────────────────────────────────

  function renderLogos(logos) {
    document.getElementById('logoGrid').innerHTML = logos.map((logo, i) => `
      <div class="logo-card" data-index="${i}" data-src="${esc(logo.src)}">
        <div class="logo-card-header">
          <span class="logo-card-title">Logo ${i + 1}</span>
        </div>
        <div class="logo-preview">
          <img src="${esc(logo.src)}" alt="${esc(logo.alt)}">
        </div>
        <div class="logo-card-body">
          <div class="field-group">
            <label class="field-label">Caption</label>
            <input class="field-input logo-caption-input" value="${esc(logo.caption || '')}" oninput="markDirty()" />
          </div>
          <div class="field-group">
            <label class="field-label">Alt Text</label>
            <input class="field-input logo-alt-input" value="${esc(logo.alt)}" oninput="markDirty()" />
          </div>
          <input type="file" accept="image/*" style="display:none" onchange="uploadLogo(this, ${i})">
          <button class="btn-upload" onclick="this.previousElementSibling.click()">↑ Replace Image</button>
        </div>
      </div>`).join('');
  }

  async function uploadLogo(input, index) {
    const file = input.files[0];
    if (!file) return;
    const ext  = file.name.split('.').pop().toLowerCase();
    const path = `images/logo${index + 1}.${ext}`;
    const card = document.querySelectorAll('#logoGrid .logo-card')[index];

    const btn = card.querySelector('.btn-upload');
    btn.textContent = 'Uploading…';
    btn.disabled = true;

    try {
      const b64 = await new Promise((res, rej) => {
        const reader = new FileReader();
        reader.onload = () => res(reader.result.split(',')[1]);
        reader.onerror = rej;
        reader.readAsDataURL(file);
      });

      // Check for existing file SHA
      let sha;
      try { sha = (await ghFetch(path)).sha; } catch {}

      const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${path}`, {
        method: 'PUT',
        headers: { Authorization: `Bearer ${GH_TOKEN}`, Accept: 'application/vnd.github+json', 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: `Update logo ${index + 1} via CMS`, content: b64, ...(sha ? { sha } : {}) }),
      });
      if (!res.ok) throw new Error(res.status);

      // Update preview and card src
      card.dataset.src = path;
      card.querySelector('.logo-preview img').src = path + '?t=' + Date.now();
      markDirty();
      showToast('Image uploaded — hit Save & Deploy to publish.', 'success');
    } catch {
      showToast('Image upload failed. Try again.', 'error');
    } finally {
      btn.textContent = '↑ Replace Image';
      btn.disabled = false;
    }
  }

  // ── Collect data ──────────────────────────────────────────────────────────

  function collectEndorsements() {
    return {
      logos: [...document.querySelectorAll('#logoGrid .logo-card')].map(card => ({
        src: card.dataset.src,
        alt: card.querySelector('.logo-alt-input').value.trim(),
        caption: card.querySelector('.logo-caption-input').value.trim(),
      })),
      categories: [...document.querySelectorAll('.column')].map(col => ({
        name: col.querySelector('.col-name-input').value.trim(),
        icon: col.dataset.icon,
        endorsements: [...col.querySelectorAll('.item')].map(item => {
          const e = {
            title: item.querySelector('.item-title-input').value.trim(),
            name:  item.querySelector('.item-name-input').value.trim(),
          };
          const hs = item.dataset.headshot;
          if (hs && hs !== 'images/headshot-default.svg') e.headshot = hs;
          return e;
        }).filter(e => e.title || e.name),
      })),
    };
  }

  function collectAbout() {
    return {
      bioSections: [...document.querySelectorAll('#bioGrid .about-card')].map(card => ({
        tag: card.querySelector('.bio-tag-input').value.trim(),
        paragraphs: [...card.querySelectorAll('.bio-para-input')].map(t => t.value.trim()).filter(Boolean),
      })),
      credentials: {
        eyebrow: document.getElementById('credEyebrow').value.trim(),
        items: [...document.querySelectorAll('#credGrid .about-card')].map(card => ({
          title:       card.querySelector('.cred-title-input').value.trim(),
          description: card.querySelector('.cred-desc-input').value.trim(),
        })),
      },
    };
  }

  // ── Save & Deploy ─────────────────────────────────────────────────────────

  async function saveAndDeploy() {
    if (sessionStorage.getItem('cms_auth') !== '1') { showToast('Not logged in.', 'error'); return; }

    const btn = document.getElementById('saveBtn');
    btn.disabled = true;
    btn.textContent = 'Deploying…';

    const fileKey = activeTab === 'about' ? 'about' : 'endorsements';
    const data    = fileKey === 'about' ? collectAbout() : collectEndorsements();
    const json    = JSON.stringify(data, null, 2);
    const content = btoa(unescape(encodeURIComponent(json)));
    const file    = FILES[fileKey];

    try {
      const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${file.path}`, {
        method: 'PUT',
        headers: {
          Authorization: `Bearer ${GH_TOKEN}`,
          Accept: 'application/vnd.github+json',
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({
          message: `Update ${fileKey} via CMS admin`,
          content,
          sha: file.sha,
        }),
      });
      if (!res.ok) throw new Error(res.status);
      file.sha = (await res.json()).content.sha;
      clearDirty();
      showToast('Deployed! Live in ~1 min.', 'success');
      document.getElementById('deployBanner').classList.add('visible');
      setTimeout(() => document.getElementById('deployBanner').classList.remove('visible'), 90000);
    } catch {
      showToast('Deploy failed. Check your token.', 'error');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Save & Deploy';
    }
  }

  // ── Endorsements: Add / Delete / Drag ────────────────────────────────────

  function addItem(btn) {
    const list = btn.closest('.column').querySelector('.item-list');
    const tmp = document.createElement('div');
    tmp.innerHTML = itemHTML();
    const li = tmp.firstElementChild;
    li.classList.add('new-item');
    list.appendChild(li);
    li.querySelector('.item-title-input').focus();
    updateCount(list);
    markDirty();
    setTimeout(() => li.classList.remove('new-item'), 800);
  }

  function addItemTop(btn) {
    const list = btn.closest('.column').querySelector('.item-list');
    const tmp = document.createElement('div');
    tmp.innerHTML = itemHTML();
    const li = tmp.firstElementChild;
    li.classList.add('new-item');
    list.prepend(li);
    li.querySelector('.item-title-input').focus();
    updateCount(list);
    markDirty();
    setTimeout(() => li.classList.remove('new-item'), 800);
  }

  function deleteItem(btn) {
    const item = btn.closest('.item');
    const list = item.closest('.item-list');
    item.remove();
    updateCount(list);
    markDirty();
  }

  function updateCount(list) {
    const col = list.closest('.column');
    const ci = [...document.querySelectorAll('.column')].indexOf(col);
    const el = document.getElementById(`count-${ci}`);
    if (el) el.textContent = list.querySelectorAll('.item').length;
  }

  function onDragStart(e) {
    dragSrc = e.currentTarget;
    dragSrc.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', '');
  }
  function onDragEnd() {
    document.querySelectorAll('.item').forEach(el => el.classList.remove('dragging', 'drag-over'));
    dragSrc = null;
  }
  function onDragOver(e) {
    e.preventDefault();
    const target = e.target.closest('.item');
    document.querySelectorAll('.item').forEach(el => el.classList.remove('drag-over'));
    if (target && target !== dragSrc) target.classList.add('drag-over');
  }
  function onDrop(e) {
    e.preventDefault();
    const target = e.target.closest('.item');
    if (!dragSrc || !target || dragSrc === target) return;
    const list = target.parentElement;
    const items = [...list.querySelectorAll('.item')];
    const si = items.indexOf(dragSrc), ti = items.indexOf(target);
    list.insertBefore(dragSrc, si < ti ? target.nextSibling : target);
    document.querySelectorAll('.item').forEach(el => el.classList.remove('drag-over'));
    markDirty();
  }

  // ── Dirty state ───────────────────────────────────────────────────────────

  function markDirty() {
    dirty = true;
    document.getElementById('unsavedBadge').classList.add('visible');
  }
  function clearDirty() {
    dirty = false;
    document.getElementById('unsavedBadge').classList.remove('visible');
  }
  window.addEventListener('beforeunload', e => { if (dirty) { e.preventDefault(); e.returnValue = ''; } });

  // ── Toast ─────────────────────────────────────────────────────────────────

  let toastTimer;
  function showToast(msg, type = '') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast' + (type ? ` ${type}` : '');
    clearTimeout(toastTimer);
    requestAnimationFrame(() => requestAnimationFrame(() => t.classList.add('show')));
    toastTimer = setTimeout(() => t.classList.remove('show'), 4000);
  }

  // ── Util ──────────────────────────────────────────────────────────────────

  function b64decode(str) {
    const binary = atob(str.replace(/\n/g, ''));
    const bytes = Uint8Array.from(binary, c => c.charCodeAt(0));
    return new TextDecoder().decode(bytes);
  }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
</script>
</body>
